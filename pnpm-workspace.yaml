catalogs:
  loader-utils-2:
    'loader-utils': '^2.0.4'

allowBuilds:
  '@parcel/watcher': false
  core-js: false
  simple-git-hooks: false
  svelte-preprocess: false

dedupePeers: true

autoInstallPeers: false

peerDependencyRules:
  ignoreMissing:
    - webpack
    - '@algolia/client-search'
    - algoliasearch
    - search-insights

engineStrict: true

hoistPattern: []

# Reduce the risk of installing compromised packages
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@rspack/*'
  - 'rspack-chain'
  - '@rsbuild/*'
  - '@rslib/*'
  - '@rspress/*'
  - '@rstest/*'
  - '@rslint/*'
  - '@tailwindcss/*'
  - 'rslog'
  - 'tailwindcss'
  - 'reduce-configs'
  - '@rstack-dev/*'
  - '@rstackjs/*'
  - 'rsbuild-plugin-*'
  - '@swc/*'
  - 'heading-case'

patchedDependencies:
  css-loader@7.1.4: patches/css-loader@7.1.4.patch
  dotenv-expand@13.0.0: patches/dotenv-expand@13.0.0.patch
  postcss-loader@8.2.1: patches/postcss-loader@8.2.1.patch

# Prevent un-reviewed build scripts
strictDepBuilds: true

strictPeerDependencies: false
